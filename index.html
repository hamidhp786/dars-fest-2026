<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dars Fest 2026 - Live Score & Results</title>
  <style>
    :root { --primary: #1b5e20; --accent: #2e7d32; --bg: #f4f7f6; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
    header { background: var(--primary); color: white; text-align: center; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    h1 { margin: 0; font-size: 24px; }
    .container { max-width: 800px; margin: 20px auto; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h2 { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 8px; margin-top: 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #e0e0e0; padding: 12px 8px; text-align: center; font-size: 14px; }
    th { background: var(--accent); color: white; font-weight: 600; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
    .gallery-grid img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
    .loading { text-align: center; color: #777; font-style: italic; }
  </style>
</head>
<body>

  <header>
    <h1>🏆 DARS FEST 2026 🏆</h1>
    <p style="margin: 5px 0 0 0; opacity: 0.9;">Live Score & Program Results</p>
  </header>

  <div class="container">
    
    <!-- Leaderboard Section -->
    <div class="card">
      <h2>📊 Group Leaderboard</h2>
      <table>
        <thead>
          <tr>
            <th>Team Name</th>
            <th>Points</th>
            <th>Rank</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body">
          <tr><td colspan="3" class="loading">Loading scores...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Item Results Section -->
    <div class="card">
      <h2>📜 Item Wise Results</h2>
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>1st Place</th>
            <th>2nd Place</th>
            <th>3rd Place</th>
          </tr>
        </thead>
        <tbody id="results-body">
          <tr><td colspan="4" class="loading">Loading results...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Photo Gallery Section -->
    <div class="card">
      <h2>📸 Photo Gallery</h2>
      <p style="font-size: 13px; color: #666;">ഫോട്ടോകൾ അപ്‌ലോഡ് ചെയ്യാൻ ImgBB പോലെയുള്ള Free Hosting ഉപയോഗിച്ച് ലിങ്ക് താഴെ നൽകാം.</p>
      <div class="gallery-grid">
        <img src="https://via.placeholder.com/150" alt="Fest Photo">
        <img src="https://via.placeholder.com/150" alt="Fest Photo">
      </div>
    </div>

  </div>

  <script>
    const SHEET_ID = '1MlKLHMU-OuRfTTfnt4q1H_LG4hnEqdrPHtw0GGIBJrE';

    // Fetch Leaderboard Data
    const leaderboardUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Leaderboard`;
    fetch(leaderboardUrl)
      .then(res => res.text())
      .then(data => {
        // Cleaning response data
        const jsonString = data.substring(data.indexOf('{'), data.lastIndexOf('}') + 1);
        const json = JSON.parse(jsonString);
        const rows = json.table.rows;
        let html = '';
        
        rows.forEach((row) => {
          if (!row.c || !row.c[0]) return;
          const team = row.c[0] ? row.c[0].v : '-';
          const points = row.c[1] ? row.c[1].v : '0';
          const rank = row.c[2] ? row.c[2].v : '-';
          
          // Header വരി ഡാറ്റയായി വരാതിരിക്കാൻ
          if (team !== 'Team Name') {
            html += `<tr><td><b>${team}</b></td><td>${points}</td><td>${rank}</td></tr>`;
          }
        });
        document.getElementById('leaderboard-body').innerHTML = html || '<tr><td colspan="3">No data available</td></tr>';
      })
      .catch((err) => {
        console.error(err);
        document.getElementById('leaderboard-body').innerHTML = '<tr><td colspan="3">Error loading data. Check console.</td></tr>';
      });

    // Fetch Results Data
    const resultsUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Results`;
    fetch(resultsUrl)
      .then(res => res.text())
      .then(data => {
        const jsonString = data.substring(data.indexOf('{'), data.lastIndexOf('}') + 1);
        const json = JSON.parse(jsonString);
        const rows = json.table.rows;
        let html = '';
        
        rows.forEach((row) => {
          if (!row.c || !row.c[0]) return;
          const item = row.c[0] ? row.c[0].v : '-';
          const first = row.c[1] ? row.c[1].v : '-';
          const second = row.c[2] ? row.c[2].v : '-';
          const third = row.c[3] ? row.c[3].v : '-';
          
          if (item !== 'Item') {
            html += `<tr><td><b>${item}</b></td><td>${first}</td><td>${second}</td><td>${third}</td></tr>`;
          }
        });
        document.getElementById('results-body').innerHTML = html || '<tr><td colspan="4">No results available</td></tr>';
      })
      .catch((err) => {
        console.error(err);
        document.getElementById('results-body').innerHTML = '<tr><td colspan="4">No results added yet</td></tr>';
      });
  </script>

</body>
</html>
